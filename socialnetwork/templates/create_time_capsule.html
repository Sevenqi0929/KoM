{% extends 'base.html' %}

{% block title %}Create Time Capsule{% endblock %}

{% block content %}
<div style="max-width: 800px; margin: 50px auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.05);">
    <h1 style="color: #e91e63; font-size: 36px; margin-bottom: 30px;">Create Time Capsule</h1>
    
    <form id="capsuleForm" method="POST" action="{{ url_for('create_time_capsule') }}" enctype="multipart/form-data">
        <div style="margin-bottom: 20px;">
            <label for="title" style="display: block; font-size: 16px; color: #333; margin-bottom: 8px;">Title</label>
            <input type="text" id="title" name="title" required style="
                width: 100%;
                padding: 12px 15px;
                font-size: 16px;
                border: 1px solid #ddd;
                border-radius: 6px;
                box-sizing: border-box;
            ">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label for="content" style="display: block; font-size: 16px; color: #333; margin-bottom: 8px;">Your Content</label>
            <textarea id="content" name="content" rows="10" required style="
                width: 100%;
                padding: 12px 15px;
                font-size: 16px;
                border: 1px solid #ddd;
                border-radius: 6px;
                box-sizing: border-box;
                resize: vertical;
            "></textarea>
        </div>
        
        <div style="margin-bottom: 20px;">
            <label for="partner_id" style="display: block; font-size: 16px; color: #333; margin-bottom: 8px;">Choose Partner</label>
            <select id="partner_id" name="partner_id" required style="
                width: 100%;
                padding: 12px 15px;
                font-size: 16px;
                border: 1px solid #ddd;
                border-radius: 6px;
                box-sizing: border-box;
            ">
                {% for u in users %}
                    <option value="{{ u.id }}">{{ u.username }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div style="margin-bottom: 20px;">
            <label for="open_date" style="display: block; font-size: 16px; color: #333; margin-bottom: 8px;">Open Date</label>
            <input type="date" id="open_date" name="open_date" min="{{ today }}" required style="
                width: 100%;
                padding: 12px 15px;
                font-size: 16px;
                border: 1px solid #ddd;
                border-radius: 6px;
                box-sizing: border-box;
            ">
        </div>
        
        <!-- 修复：显示原生上传框，保留原有排版 -->
        <div style="margin-bottom: 30px;">
            <label style="display: block; font-size: 16px; color: #333; margin-bottom: 8px;">Upload Image</label>
            <input type="file" name="image" id="imageInput" accept="image/png, image/jpg, image/gif, image/bmp" 
                   style="padding: 5px; font-size: 14px; cursor: pointer; width: 100%; box-sizing: border-box;">
        </div>
        
        <button type="submit" style="
            padding: 12px 24px;
            background: #e91e63;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        ">Create Capsule</button>
        
        <a href="{{ url_for('home') }}" style="
            display: inline-block;
            margin-left: 15px;
            padding: 12px 24px;
            background: #f5f5f5;
            color: #333;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        ">Cancel</a>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // 保留原有基础事件，无额外修改
});
</script>
{% endblock %}
