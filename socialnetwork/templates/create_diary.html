{% extends 'base.html' %}

{% block title %}Create New Diary{% endblock %}

{% block content %}
<div style="max-width: 800px; margin: 50px auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.05);">
    <h1 style="color: #0d47a1; font-size: 36px; margin-bottom: 30px;">Create New Diary</h1>
    
    <form id="diaryForm" method="POST" action="{{ url_for('create_diary') }}" enctype="multipart/form-data">
        <div style="margin-bottom: 20px;">
            <label for="title" style="display: block; font-size: 16px; color: #333; margin-bottom: 8px;">Title</label>
            <input type="text" id="title" name="title" required style="
                width: 100%;
                padding: 12px 15px;
                font-size: 16px;
                border: 1px solid #ddd;
                border-radius: 6px;
                box-sizing: border-box;
            ">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label for="content" style="display: block; font-size: 16px; color: #333; margin-bottom: 8px;">Content</label>
            <textarea id="content" name="content" rows="10" required style="
                width: 100%;
                padding: 12px 15px;
                font-size: 16px;
                border: 1px solid #ddd;
                border-radius: 6px;
                box-sizing: border-box;
                resize: vertical;
            "></textarea>
        </div>
        
        <!-- 原生上传框，保留排版 -->
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-size: 16px; color: #333; margin-bottom: 8px;">Upload Image</label>
            <input type="file" name="image" id="imageInput" accept="image/png, image/jpg, image/gif, image/bmp" 
                   style="padding: 5px; font-size: 14px; cursor: pointer; width: 100%; box-sizing: border-box;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <input type="checkbox" name="is_collaborative" style="width: 18px; height: 18px;">
                <span style="font-size: 16px; color: #333;">Collaborative Diary</span>
            </label>
        </div>
        
        <!-- 仅创建者可见：协作权限设置（默认Open） -->
        <div style="margin-bottom: 30px;">
            <label for="join_permission" style="display: block; font-size: 16px; color: #333; margin-bottom: 8px;">Join Permission</label>
            <select id="join_permission" name="join_permission" style="
                width: 100%;
                padding: 12px 15px;
                font-size: 16px;
                border: 1px solid #ddd;
                border-radius: 6px;
                box-sizing: border-box;
            ">
                <option value="open" selected>Open (Anyone can join)</option>
                <option value="private">Private (No one can join)</option>
            </select>
            <p style="font-size: 12px; color: #666; margin-top: 5px;">
                Open: Other users can request to join and edit this diary<br>
                Private: No one can join or edit this diary except you
            </p>
        </div>
        
        <button type="submit" style="
            padding: 12px 24px;
            background: #0d47a1;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        ">Create Diary</button>
        
        <a href="{{ url_for('home') }}" style="
            display: inline-block;
            margin-left: 15px;
            padding: 12px 24px;
            background: #f5f5f5;
            color: #333;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        ">Cancel</a>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // 保留原有基础事件
});
</script>
{% endblock %}
